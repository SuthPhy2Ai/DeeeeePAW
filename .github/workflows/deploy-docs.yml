name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "DeePAW Manual/requirements.txt"

      - name: Build English documentation
        run: |
          cd "DeePAW Manual"
          sphinx-build -b html source _build/html/en

      - name: Build Chinese documentation
        run: |
          cd "DeePAW Manual"
          sphinx-build -b html -D language=zh_CN source _build/html/zh_CN

      - name: Create language selection page
        run: |
          python3 << 'PYEOF'
          html_content = '''<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>DeePAW Documentation</title>
              <style>
                  body {
                      font-family: 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      height: 100vh;
                      margin: 0;
                      background:
                          radial-gradient(circle at top left, rgba(255, 255, 255, 0.12), transparent 35%),
                          linear-gradient(135deg, #0f4c5c 0%, #1d7874 45%, #679289 100%);
                  }
                  .container {
                      text-align: center;
                      background: rgba(255, 255, 255, 0.96);
                      padding: 3rem 4rem;
                      border-radius: 18px;
                      box-shadow: 0 18px 60px rgba(0,0,0,0.18);
                      max-width: 760px;
                      margin: 1.5rem;
                  }
                  h1 {
                      color: #12343b;
                      margin-bottom: 1rem;
                      font-size: 2.5rem;
                  }
                  .subtitle {
                      color: #34535b;
                      margin-bottom: 0.75rem;
                      font-size: 1.1rem;
                  }
                  .note {
                      color: #56737a;
                      margin: 0 auto 2rem;
                      max-width: 38rem;
                      line-height: 1.6;
                  }
                  .languages {
                      display: flex;
                      gap: 1rem;
                      justify-content: center;
                      flex-wrap: wrap;
                  }
                  a {
                      display: inline-block;
                      padding: 1rem 2.5rem;
                      background: #135d66;
                      color: white;
                      text-decoration: none;
                      border-radius: 999px;
                      font-weight: 600;
                      font-size: 1.1rem;
                      transition: transform 0.2s, box-shadow 0.2s;
                  }
                  a:hover {
                      transform: translateY(-2px);
                      box-shadow: 0 8px 24px rgba(19, 93, 102, 0.28);
                  }
                  a.chinese {
                      background: #bc6c25;
                  }
                  a.chinese:hover {
                      box-shadow: 0 8px 24px rgba(188, 108, 37, 0.28);
                  }
                  @media (max-width: 640px) {
                      .container {
                          padding: 2rem 1.5rem;
                      }
                      h1 {
                          font-size: 2rem;
                      }
                      .languages {
                          flex-direction: column;
                      }
                      a {
                          width: 100%;
                          box-sizing: border-box;
                      }
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>DeePAW Documentation</h1>
                  <p class="subtitle">Choose your language / 选择语言</p>
                  <p class="note">Select a documentation language below. You can also switch languages later from the documentation navigation bar.</p>
                  <div class="languages">
                      <a href="en/index.html">English</a>
                      <a href="zh_CN/index.html" class="chinese">中文</a>
                  </div>
              </div>
          </body>
          </html>'''

          with open('DeePAW Manual/_build/html/index.html', 'w') as f:
              f.write(html_content)
          PYEOF

      - name: Prepare docs directory
        run: |
          rm -rf docs
          cp -r "DeePAW Manual/_build/html" docs
          touch docs/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
