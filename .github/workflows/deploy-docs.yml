name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "DeePAW Manual/requirements.txt"

      - name: Build English documentation
        run: |
          cd "DeePAW Manual"
          sphinx-build -b html source _build/html/en

      - name: Build Chinese documentation
        run: |
          cd "DeePAW Manual"
          sphinx-build -b html -D language=zh_CN source _build/html/zh_CN

      - name: Create language selection page
        run: |
          python3 << 'PYEOF'
          html_content = '''<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>DeePAW Documentation</title>
              <style>
                  :root {
                      --bg: #f4f7fb;
                      --panel: rgba(255, 255, 255, 0.92);
                      --border: rgba(30, 41, 59, 0.08);
                      --text: #10233a;
                      --muted: #5f7288;
                      --shadow: 0 20px 60px rgba(15, 23, 42, 0.10);
                      --english: #0f766e;
                      --english-hover: #115e59;
                      --chinese: #1d4ed8;
                      --chinese-hover: #1e40af;
                  }
                  body {
                      font-family: Georgia, 'Times New Roman', 'Noto Serif', 'Noto Serif SC', serif;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      min-height: 100vh;
                      margin: 0;
                      color: var(--text);
                      background:
                          radial-gradient(circle at top left, rgba(29, 78, 216, 0.08), transparent 28%),
                          radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.08), transparent 32%),
                          linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
                  }
                  .container {
                      text-align: center;
                      background: var(--panel);
                      padding: 3.25rem 3rem;
                      border: 1px solid var(--border);
                      border-radius: 28px;
                      box-shadow: var(--shadow);
                      max-width: 720px;
                      margin: 2rem;
                      backdrop-filter: blur(12px);
                  }
                  .eyebrow {
                      margin: 0 0 1rem;
                      color: var(--muted);
                      font-family: 'Segoe UI', 'Noto Sans', 'Noto Sans SC', sans-serif;
                      font-size: 0.78rem;
                      font-weight: 700;
                      letter-spacing: 0.14em;
                      text-transform: uppercase;
                  }
                  h1 {
                      margin: 0 0 0.9rem;
                      font-size: clamp(2.2rem, 5vw, 3.1rem);
                      line-height: 1.08;
                      letter-spacing: -0.03em;
                  }
                  .subtitle {
                      color: #1f3348;
                      margin: 0 0 0.7rem;
                      font-size: 1.1rem;
                      font-weight: 600;
                  }
                  .note {
                      color: var(--muted);
                      margin: 0 auto 2.2rem;
                      max-width: 34rem;
                      line-height: 1.7;
                      font-family: 'Segoe UI', 'Noto Sans', 'Noto Sans SC', sans-serif;
                  }
                  .languages {
                      display: grid;
                      grid-template-columns: repeat(2, minmax(220px, 1fr));
                      gap: 1rem;
                  }
                  a {
                      display: block;
                      padding: 1.2rem 1.35rem;
                      background: #ffffff;
                      border: 1px solid rgba(15, 23, 42, 0.08);
                      border-radius: 20px;
                      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
                      color: var(--text);
                      text-decoration: none;
                      text-align: left;
                      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
                  }
                  a:hover {
                      transform: translateY(-2px);
                      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.10);
                  }
                  a.english:hover {
                      border-color: rgba(15, 118, 110, 0.28);
                  }
                  a.chinese:hover {
                      border-color: rgba(29, 78, 216, 0.24);
                  }
                  .language-name {
                      display: flex;
                      align-items: center;
                      justify-content: space-between;
                      margin-bottom: 0.35rem;
                      font-family: 'Segoe UI', 'Noto Sans', 'Noto Sans SC', sans-serif;
                      font-size: 1.08rem;
                      font-weight: 700;
                  }
                  .language-name span {
                      color: var(--muted);
                      font-size: 0.92rem;
                      font-weight: 600;
                  }
                  .english .language-name strong {
                      color: var(--english);
                  }
                  .chinese .language-name strong {
                      color: var(--chinese);
                  }
                  .language-copy {
                      color: var(--muted);
                      font-family: 'Segoe UI', 'Noto Sans', 'Noto Sans SC', sans-serif;
                      font-size: 0.94rem;
                      line-height: 1.55;
                  }
                  .footer {
                      margin-top: 1.5rem;
                      color: #7a8b9c;
                      font-family: 'Segoe UI', 'Noto Sans', 'Noto Sans SC', sans-serif;
                      font-size: 0.88rem;
                  }
                  @media (max-width: 640px) {
                      .container {
                          padding: 2.25rem 1.25rem;
                          border-radius: 22px;
                      }
                      .languages {
                          grid-template-columns: 1fr;
                      }
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <p class="eyebrow">Documentation Portal</p>
                  <h1>DeePAW Documentation</h1>
                  <p class="subtitle">Choose your language</p>
                  <p class="note">Open the language version you prefer. You can switch languages again later from the documentation sidebar.</p>
                  <div class="languages">
                      <a href="en/index.html" class="english">
                          <div class="language-name"><strong>English</strong><span>EN</span></div>
                          <div class="language-copy">Read the full documentation in English.</div>
                      </a>
                      <a href="zh_CN/index.html" class="chinese">
                          <div class="language-name"><strong>Chinese</strong><span>ZH</span></div>
                          <div class="language-copy">Read the full documentation in Simplified Chinese.</div>
                      </a>
                  </div>
                  <div class="footer">DeePAW user guide, platform overview, and deployment notes</div>
              </div>
          </body>
          </html>'''

          with open('DeePAW Manual/_build/html/index.html', 'w') as f:
              f.write(html_content)
          PYEOF

      - name: Prepare docs directory
        run: |
          rm -rf docs
          cp -r "DeePAW Manual/_build/html" docs
          touch docs/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
