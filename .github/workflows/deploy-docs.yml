name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "DeePAW Manual/requirements.txt"

      - name: Build English documentation
        run: |
          cd "DeePAW Manual"
          sphinx-build -b html source _build/html/en

      - name: Build Chinese documentation
        run: |
          cd "DeePAW Manual"
          sphinx-build -b html -D language=zh_CN source _build/html/zh_CN

      - name: Create language selection page
        run: |
          cat > "DeePAW Manual/_build/html/index.html" << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=en/index.html">
    <title>DeePAW Documentation</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem 4rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }
        .subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .languages {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        a {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        a.chinese {
            background: #764ba2;
        }
        a.chinese:hover {
            box-shadow: 0 4px 12px rgba(118, 75, 162, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DeePAW Documentation</h1>
        <p class="subtitle">Choose your language / 选择语言</p>
        <div class="languages">
            <a href="en/index.html">English</a>
            <a href="zh_CN/index.html" class="chinese">中文</a>
        </div>
    </div>
</body>
</html>
EOF

      - name: Prepare docs directory
        run: |
          rm -rf docs
          cp -r "DeePAW Manual/_build/html" docs
          touch docs/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4