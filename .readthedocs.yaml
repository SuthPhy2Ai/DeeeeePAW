# .readthedocs.yaml
# ReadTheDocs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: DeePAW Manual/source/conf.py
  fail_on_warning: false

# Build all formats (HTML, PDF, ePub)
formats:
  - htmlzip
  - pdf
  - epub

# Python dependencies
python:
  install:
    - requirements: DeePAW Manual/requirements.txt

# Build both English and Chinese versions
# (ReadTheDocs will automatically detect translations)